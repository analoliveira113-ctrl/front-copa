<html class="dark" lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>CopaGram | Joga Bonito Feed</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Anybody:wght@700;800;900&family=Be+Vietnam+Pro:wght@400;700&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <script id="tailwind-config">
          tailwind.config = {
            darkMode: "class",
            theme: {

                "colors": {

                        "on-secondary-container": "#706000",
                        "surface-container-low": "#eff6ea",
                        "outline": "#6e7b6b",
                        "primary-container": "#008732",
                        "tertiary-fixed-dim": "#b5c4ff",
                        "surface-container": "#e9f0e4",
                        "tertiary": "#3d57a6",
                        "on-secondary": "#ffffff",
                        "surface-dim": "#d5dcd0",
                        "surface-variant": "#dde5d9",
                        "on-primary-container": "#f7fff2",
                        "on-tertiary-container": "#fefbff",
                        "on-tertiary": "#ffffff",
                        "tertiary-container": "#5771c1",
                        "primary": "#006b26",
                        "on-error": "#ffffff",
                        "on-background": "#171d16",
                        "surface-container-lowest": "#ffffff",
                        "surface-bright": "#f4fcef",
                        "tertiary-fixed": "#dbe1ff",
                        "secondary-container": "#fddc00",
                        "on-primary-fixed-variant": "#00531c",
                        "surface-tint": "#006e27",
                        "error-container": "#ffdad6",
                        "secondary-fixed-dim": "#e3c600",
                        "surface": "#f4fcef",
                        "background": "#f4fcef",
                        "secondary": "#6d5e00",
                        "primary-fixed": "#81fc90",
                        "outline-variant": "#bdcab9",
                        "surface-container-high": "#e3eade",
                        "inverse-primary": "#65df76",
                        "on-surface-variant": "#3e4a3d",
                        "surface-container-highest": "#dde5d9",
                        "on-secondary-fixed-variant": "#524600",
                        "error": "#ba1a1a",
                        "inverse-surface": "#2b322a",
                        "on-surface": "#171d16",
                        "inverse-on-surface": "#ecf3e7",
                        "on-secondary-fixed": "#211b00",
                        "primary-fixed-dim": "#65df76",
                        "on-primary": "#ffffff"
                },
                "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                },
                "spacing": {
                        "md": "16px",
                        "xs": "4px",
                        "container-margin": "20px",
                        "sm": "8px",
                        "base": "4px",
                        "gutter": "16px",
                        "xl": "40px",
                        "lg": "24px"
                },
                "fontFamily": {
                        "stats-number": ["Anybody"],
                        "display-lg": ["Anybody"],
                        "body-md": ["Be Vietnam Pro"],
                        "display-lg-mobile": ["Anybody"],
                        "label-bold": ["Be Vietnam Pro"],
                        "headline-md": ["Anybody"],
                        "body-lg": ["Be Vietnam Pro"]
                },
                "fontSize": {
                        "stats-number": ["20px", {"lineHeight": "1", "fontWeight": "900"}],
                        "display-lg": ["48px", {"lineHeight": "1.1", "letterSpacing": "-0.02em", "fontWeight": "800"}],
                        "body-md": ["16px", {"lineHeight": "1.5", "fontWeight": "400"}],
                        "display-lg-mobile": ["36px", {"lineHeight": "1.1", "fontWeight": "800"}],
                        "label-bold": ["14px", {"lineHeight": "1.2", "fontWeight": "700"}],
                        "headline-md": ["24px", {"lineHeight": "1.2", "fontWeight": "700"}],
                        "body-lg": ["18px", {"lineHeight": "1.6", "fontWeight": "400"}]
                }
              },
            },
          }
    </script>
    <style>
        body {
            background-color: #002107;
            color: #f7fff2;
            -webkit-tap-highlight-color: transparent;
        }
        .glass-card {
            background: rgba(0, 107, 38, 0.2);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(129, 252, 144, 0.1);
        }
        .story-gradient {
            background: linear-gradient(45deg, #fddc00, #006e27, #002776);
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        body {
          min-height: max(884px, 100dvh);
        }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        nav { transition: transform 0.3s ease-in-out; }
    </style>
</head>
<body class="font-body-md text-body-md antialiased overflow-x-hidden">

    <header class="fixed top-0 w-full z-50 bg-surface/40 dark:bg-surface-container/40 backdrop-blur-xl border-b border-outline-variant/20 shadow-[0_4px_15px_rgba(61,87,166,0.1)]">
        <div class="flex justify-between items-center px-container-margin h-16 w-full max-w-7xl mx-auto">
            <div class="flex items-center gap-2">
                <span class="material-symbols-outlined text-primary dark:text-primary-fixed text-2xl" data-icon="sports_soccer">sports_soccer</span>
                <h1 class="font-display-lg text-headline-md font-extrabold text-primary dark:text-primary-fixed tracking-tight">CopaGram</h1>
            </div>
            <button class="active:scale-95 duration-200 hover:opacity-80 transition-opacity">
                <span class="material-symbols-outlined text-primary dark:text-primary-fixed text-2xl" data-icon="send">send</span>
            </button>
        </div>
    </header>

    <main class="pt-20 pb-24 max-w-lg mx-auto px-4">
        <section class="mb-8 overflow-x-auto no-scrollbar py-2">
            <div class="flex gap-4 min-w-max">
                <div class="flex flex-col items-center gap-1">
                    <div class="relative p-[3px] rounded-full story-gradient shadow-lg">
                        <div class="bg-surface-container-highest rounded-full p-1">
                            <img id="my-avatar" alt="User" class="w-16 h-16 rounded-full object-cover" src="https://images.unsplash.com/photo-1534528741775-53994a69daeb?auto=format&fit=crop&q=80&w=200"/>
                        </div>
                        <div onclick="window.location.href='compartilhar.html'" class="absolute bottom-0 right-0 bg-secondary-container text-on-secondary-container rounded-full w-5 h-5 flex items-center justify-center border-2 border-surface cursor-pointer">
                            <span class="material-symbols-outlined text-[12px] font-bold" data-icon="add">add</span>
                        </div>
                    </div>
                    <span class="text-xs font-label-bold text-on-surface-variant truncate w-16 text-center">Meu Post</span>
                </div>
                <script>
                    const fans = [
                        { name: "Thiago_10", img: "https://images.unsplash.com/photo-1500648767791-00dcc994a43e?auto=format&fit=crop&q=80&w=200" },
                        { name: "Beatriz.G", img: "https://images.unsplash.com/photo-1494790108377-be9c29b29330?auto=format&fit=crop&q=80&w=200" },
                        { name: "Lucas_Fla", img: "https://images.unsplash.com/photo-1507003211169-0a1dd7228f2d?auto=format&fit=crop&q=80&w=200" },
                        { name: "MariaFutebol", img: "https://images.unsplash.com/photo-1534528741775-53994a69daeb?auto=format&fit=crop&q=80&w=200" },
                        { name: "NeymarJr_Fan", img: "https://images.unsplash.com/photo-1506794778202-cad84cf45f1d?auto=format&fit=crop&q=80&w=200" }
                    ];
                    fans.forEach(fan => {
                        document.write(`
                            <div class="flex flex-col items-center gap-1 group cursor-pointer">
                                <div class="relative p-[3px] rounded-full story-gradient group-active:scale-95 transition-transform">
                                    <div class="bg-[#002107] rounded-full p-1">
                                        <img src="${fan.img}" class="w-16 h-16 rounded-full object-cover border-2 border-transparent" alt="${fan.name}">
                                    </div>
                                    <div class="absolute -top-1 -right-1 bg-white rounded-full p-0.5 shadow-sm">
                                        <div class="w-4 h-3 bg-gradient-to-b from-[#009b3a] via-[#fedd00] to-[#002776] rounded-[2px]"></div>
                                    </div>
                                </div>
                                <span class="text-xs font-label-bold text-on-surface-variant truncate w-16 text-center">${fan.name}</span>
                            </div>
                        `);
                    });
                </script>
            </div>
        </section>

        <div id="feed-container" class="space-y-lg">
            <div class="text-center py-12 text-on-surface-variant">
                <span class="material-symbols-outlined text-4xl animate-spin mb-2" data-icon="sync">sync</span>
                <p class="text-sm font-medium">Aquecendo os motores e carregando o feed...</p>
            </div>
        </div>
    </main>

    <nav class="fixed bottom-0 w-full z-50 rounded-t-xl bg-surface/60 dark:bg-surface-container-highest/60 backdrop-blur-2xl shadow-[0_-4px_20px_rgba(61,87,166,0.15)]">
        <div class="flex justify-around items-center w-full px-4 py-2 pb-safe">
            <button onclick="window.location.href='feed.html'" class="flex items-center justify-center bg-secondary-container dark:bg-secondary text-on-secondary-container dark:text-on-secondary rounded-full p-3 shadow-[0_0_10px_rgba(253,220,0,0.4)] active:scale-90 duration-150">
                <span class="material-symbols-outlined" data-icon="home" style="font-variation-settings: 'FILL' 1;">home</span>
            </button>
            <button class="flex items-center justify-center text-on-surface-variant dark:text-outline-variant p-3 hover:bg-on-surface-variant/10 rounded-full transition-all active:scale-90 duration-150">
                <span class="material-symbols-outlined" data-icon="search">search</span>
            </button>
            <button onclick="window.location.href='compartilhar.html'" class="flex items-center justify-center text-on-surface-variant dark:text-outline-variant p-3 hover:bg-on-surface-variant/10 rounded-full transition-all active:scale-90 duration-150">
                <span class="material-symbols-outlined text-3xl" data-icon="add_circle">add_circle</span>
            </button>
            <button class="flex items-center justify-center text-on-surface-variant dark:text-outline-variant p-3 hover:bg-on-surface-variant/10 rounded-full transition-all active:scale-90 duration-150">
                <span class="material-symbols-outlined" data-icon="notifications">notifications</span>
            </button>
            <button onclick="window.location.href='perfil.html'" class="flex items-center justify-center text-on-surface-variant dark:text-outline-variant p-3 hover:bg-on-surface-variant/10 rounded-full transition-all active:scale-90 duration-150">
                <span class="material-symbols-outlined" data-icon="person">person</span>
            </button>
        </div>
    </nav>

    <button onclick="window.location.href='compartilhar.html'" class="fixed right-6 bottom-24 bg-primary text-on-primary p-4 rounded-full shadow-[0_8px_25px_rgba(0,107,38,0.4)] active:scale-90 transition-transform md:right-12 z-40">
        <span class="material-symbols-outlined text-2xl" data-icon="stadium">stadium</span>
    </button>

    <script src="app.js"></script>

    <script>
        const URL_DA_API = 'https://back-copa.vercel.app/api';

        function formatarTempo(dataString) {
            const agora = new Date();
            const dataPost = new Date(dataString);
            const diferencaEmSegundos = Math.floor((agora - dataPost) / 1000);

            if (diferencaEmSegundos < 60) return "Agora mesmo";
            
            const diferencaEmMinutos = Math.floor(diferencaEmSegundos / 60);
            if (diferencaEmMinutos < 60) return `Há ${diferencaEmMinutos} min`;
            
            const diferencaEmHoras = Math.floor(diferencaEmMinutos / 60);
            if (diferencaEmHoras < 24) return `Há ${diferencaEmHoras} hora${diferencaEmHoras > 1 ? 's' : ''}`;
            
            const diferencaEmDias = Math.floor(diferencaEmHoras / 24);
            return `Há ${diferencaEmDias} dia${diferencaEmDias > 1 ? 's' : ''}`;
        }

        async function carregarFeed() {
            const container = document.getElementById('feed-container');

            // 🌟 LINHAS CORRIGIDAS: Eliminámos o item antigo que forçava o torcedor_59da3
            const userSession = JSON.parse(localStorage.getItem('user'));
            if (!userSession) {
                window.location.href = 'login.html';
                return;
            }

            const currentUserId = userSession ? userSession.id : null;

            if (userSession && userSession.avatar_url) {
                document.getElementById('my-avatar').src = userSession.avatar_url;
            }
            
            try {
                const response = await fetch(`${URL_DA_API}/posts`);
                
                if (!response.ok) {
                    throw new Error("Erro ao buscar publicações do servidor.");
                }

                const posts = await response.json();

                if (posts.length === 0) {
                    container.innerHTML = `
                        <div class="text-center py-12 text-on-surface-variant">
                            <span class="material-symbols-outlined text-4xl mb-2" data-icon="auto_awesome">auto_awesome</span>
                            <p class="text-sm font-medium">O feed está vazio. Seja o primeiro a eternizar uma memória da Copa!</p>
                        </div>
                    `;
                    return;
                }

                container.innerHTML = '';

                posts.forEach(post => {
                    const username = post.profiles?.username || "torcedor_anonimo";
                    const userAvatar = post.profiles?.avatar_url || "https://images.unsplash.com/photo-1508098682722-e99c43a406b2?auto=format&fit=crop&q=80&w=200";
                    const tempoRelativo = formatarTempo(post.created_at);
                    const qtdLikes = post.likesCount || 0;
                    
                    const usuarioJaCurtiu = post.likes && Array.isArray(post.likes) 
                        ? post.likes.some(like => like.user_id === currentUserId) 
                        : false;

                    const corBotaoLike = usuarioJaCurtiu ? 'text-secondary-container' : 'text-white';

                    const postHTML = `
                        <article class="bg-surface-container-low dark:bg-surface-container-highest rounded-xl overflow-hidden shadow-[0_4px_20px_rgba(0,107,38,0.1)] border border-outline-variant/10 mb-4">
                            <div class="flex items-center justify-between p-md">
                                <div class="flex items-center gap-3">
                                    <div class="w-10 h-10 rounded-full story-gradient p-[2px]">
                                        <img alt="Creator" class="w-full h-full rounded-full object-cover border-2 border-surface-container-highest" src="${userAvatar}"/>
                                    </div>
                                    <div>
                                        <p class="font-label-bold text-on-surface">${username}</p>
                                        <p class="text-xs text-on-surface-variant flex items-center gap-1">
                                            <span class="material-symbols-outlined text-[12px]" data-icon="location_on">location_on</span>
                                            ${post.stadium_name || "Estádio Desconhecido"} ${post.match_tag ? `• ${post.match_tag}` : ''}
                                        </p>
                                    </div>
                                </div>
                                <button class="text-on-surface-variant"><span class="material-symbols-outlined" data-icon="more_horiz">more_horiz</span></button>
                            </div>
                            
                            <div class="relative group">
                                <img alt="Match day" class="w-full aspect-square object-cover" src="${post.image_url}"/>
                            </div>
                            
                            <div class="p-md">
                                <div class="flex items-center justify-between mb-2">
                                    <div class="flex items-center gap-4">
                                        <button onclick="darLike('${post.id}', this)" class="like-btn hover:scale-110 active:scale-90 transition-transform ${corBotaoLike}">
                                            <span class="material-symbols-outlined text-3xl" data-icon="sports_soccer">sports_soccer</span>
                                        </button>
                                        <button class="hover:scale-110 active:scale-90 transition-transform text-white">
                                            <span class="material-symbols-outlined text-3xl" data-icon="chat_bubble">chat_bubble</span>
                                        </button>
                                        <button class="hover:scale-110 active:scale-90 transition-transform text-white">
                                            <span class="material-symbols-outlined text-3xl" data-icon="share">share</span>
                                        </button>
                                    </div>
                                    <button class="text-white"><span class="material-symbols-outlined text-3xl" data-icon="bookmark">bookmark</span></button>
                                </div>
                                
                                <p class="text-sm font-label-bold text-on-surface mb-1">
                                    <span class="likes-contador">${qtdLikes}</span> golaços anotados
                                </p>

                                <div class="space-y-1">
                                    <p class="text-sm">
                                        <span class="font-label-bold mr-1">${username}</span> 
                                        ${post.caption || ''}
                                    </p>
                                    <p class="text-[10px] text-outline uppercase tracking-widest mt-1">${tempoRelativo}</p>
                                </div>
                            </div>
                        </article>
                    `;
                    container.innerHTML += postHTML;
                });

            } catch (error) {
                console.error(error);
                container.innerHTML = `
                    <div class="text-center py-12 text-error">
                        <span class="material-symbols-outlined text-4xl mb-2" data-icon="error">error</span>
                        <p class="text-sm font-medium">Erro ao carregar o feed da Vercel. Verifique as configurações.</p>
                    </div>
                `;
            }
        }

        async function darLike(postId, botao) {
            try {
                const userSession = JSON.parse(localStorage.getItem('user'));
                const userId = userSession ? userSession.id : null;

                if (!userId) {
                    alert("Ainda sem utilizador configurado!");
                    return;
                }

                botao.style.transform = 'scale(1.4)';
                setTimeout(() => { botao.style.transform = 'scale(1)'; }, 200);

                const response = await fetch(`${URL_DA_API}/likes/toggle`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        post_id: postId,
                        user_id: userId
                    })
                });

                if (response.ok) {
                    const resultado = await response.json();
                    
                    const card = botao.closest('article');
                    const contadorElemento = card.querySelector('.likes-contador');
                    contadorElemento.textContent = resultado.likesCount;

                    if (resultado.status === 'liked') {
                        botao.classList.add('text-secondary-container');
                        botao.classList.remove('text-white');
                    } else {
                        botao.classList.remove('text-secondary-container');
                        botao.classList.add('text-white');
                    }
                }
            } catch (error) {
                console.error("Erro ao computar o golaço:", error);
            }
        }

        window.addEventListener('DOMContentLoaded', carregarFeed);

        let lastScrollTop = 0;
        const bottomNav = document.querySelector('nav');
        window.addEventListener("scroll", function() {
            let st = window.pageYOffset || document.documentElement.scrollTop;
            if (st > lastScrollTop && st > 60) {
                bottomNav.style.transform = "translateY(100%)";
            } else {
                bottomNav.style.transform = "translateY(0)";
            }
            lastScrollTop = st <= 0 ? 0 : st;
        }, false);
    </script>
</body>
</html>
